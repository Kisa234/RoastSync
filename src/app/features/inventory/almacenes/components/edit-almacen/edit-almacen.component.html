<div class="fixed inset-0 bg-opacity-50 backdrop-blur-md flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-lg overflow-visible">

    <!-- Header -->
    <div class="flex justify-between items-center px-6 pt-4">
      <div>
        <h2 class="text-xl font-semibold text-[#1F1F1F]">Editar Almacén</h2>
        <p class="text-gray-600 text-sm">Actualiza la información del almacén</p>
      </div>
      <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600">
        <lucide-icon [img]="X" class="w-5 h-5" />
      </button>
    </div>

    <!-- Tabs -->
    <div class="px-6 pt-6">
      <ul class="flex border-b border-[#E5E5E5]">
        <li *ngFor="let t of tabs" class="mr-6">
          <button
            (click)="selectTab(t.key)"
            class="pb-2 text-sm font-medium transition"
            [class.border-b-2]="activeTab===t.key"
            [class.border-[#B8672E]]="activeTab===t.key"
            [class.text-[#1F1F1F]]="activeTab===t.key"
            [class.text-gray-500]="activeTab!==t.key">
            {{ t.label }}
          </button>
        </li>
      </ul>
    </div>

    <!-- Body -->
    <div class="px-6 py-5">

      <div *ngIf="loading" class="text-sm text-gray-600">Cargando...</div>

      <form *ngIf="!loading && activeTab==='manual'" class="grid grid-cols-2 gap-x-6 gap-y-4">

        <!-- Nombre -->
        <div class="col-span-2">
          <label class="block text-gray-700 text-sm mb-1">Nombre *</label>
          <input
            type="text"
            [(ngModel)]="model.nombre"
            name="nombre"
            placeholder="Ej: Almacén Principal"
            class="w-full border border-[#E5E5E5] rounded-lg px-3 py-2 placeholder-gray-400
                   focus:border-[#B8672E] focus:ring-2 focus:ring-[#B8672E] focus:outline-none transition" />
        </div>

        <!-- Descripción -->
        <div class="col-span-2">
          <label class="block text-gray-700 text-sm mb-1">Descripción</label>
          <textarea
            [(ngModel)]="model.descripcion"
            name="descripcion"
            placeholder="Ej: Almacén para café verde"
            rows="3"
            class="w-full border border-[#E5E5E5] rounded-lg px-3 py-2 placeholder-gray-400
                   focus:border-[#B8672E] focus:ring-2 focus:ring-[#B8672E] focus:outline-none transition"></textarea>
        </div>

      </form>

    </div>

    <!-- Footer -->
    <div class="flex justify-end items-center px-6 py-4 border-t border-[#E5E5E5] space-x-2">
      <button
        (click)="onCancel()"
        class="px-4 py-2 rounded border border-[#A67C52] hover:bg-[#F3F2F1]">
        Cancelar
      </button>

      <button
        (click)="save()"
        class="px-4 py-2 rounded bg-[#B8672E] text-white hover:bg-[#A67C52] flex items-center"
        [disabled]="isButtonDisabled()"
        [class.opacity-50]="isButtonDisabled()">
        <lucide-icon [img]="Check" class="w-5 h-5 mr-2" />
        Guardar
      </button>
    </div>

  </div>
</div>
