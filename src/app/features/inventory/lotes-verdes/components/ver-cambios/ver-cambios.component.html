<div class="fixed inset-0 bg-opacity-50 backdrop-blur-md flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-7xl overflow-visible">

    <!-- Header -->
    <div class="flex justify-between items-center px-6 pt-4">
      <div>
        <h2 class="text-xl font-semibold text-[#1F1F1F]">Historial de Cambios</h2>
        <p class="text-gray-600 text-sm">
          {{ historial.fecha_registro | date:'dd/MM/yy, HH:mm' }}
        </p>
      </div>

      <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600">
        <lucide-icon [img]="X" class="w-5 h-5" />
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-5">
      <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

        <!-- ANTES -->
        <div class="border border-[#E5E5E5] rounded-xl p-5 bg-[#FCFCFC]">
          <div class="mb-4">
            <h3 class="text-lg font-semibold text-[#1F1F1F]">Antes</h3>
            <p class="text-sm text-gray-500">Valores anteriores del lote</p>
          </div>

          <form class="grid grid-cols-2 gap-x-6 gap-y-4">
            <!-- Productor -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('productor') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Productor
              </label>
              <input
                type="text"
                [value]="antes.productor || ''"
                name="antes_productor"
                disabled
                [ngClass]="getInputClass('productor', 'before')"
              />
            </div>

            <!-- Finca -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('finca') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Finca
              </label>
              <input
                type="text"
                [value]="antes.finca || ''"
                name="antes_finca"
                disabled
                [ngClass]="getInputClass('finca', 'before')"
              />
            </div>

            <!-- Departamento -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('departamento') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Departamento
              </label>
              <input
                type="text"
                [value]="antes.departamento || ''"
                name="antes_departamento"
                disabled
                [ngClass]="getInputClass('departamento', 'before')"
              />
            </div>

            <!-- Distrito -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('distrito') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Distrito
              </label>
              <input
                type="text"
                [value]="antes.distrito || ''"
                name="antes_distrito"
                disabled
                [ngClass]="getInputClass('distrito', 'before')"
              />
            </div>

            <!-- Cliente -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('id_user') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Cliente
              </label>
              <input
                type="text"
                [value]="(antes.id_user! | UserNamePipe | async) || ''"
                name="antes_cliente"
                disabled
                [ngClass]="getInputClass('id_user', 'before')"
              />
            </div>

            <!-- Costo -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('costo') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Costo (PEN)
              </label>
              <input
                type="number"
                [value]="antes.costo || 0"
                name="antes_costo"
                disabled
                [ngClass]="getInputClass('costo', 'before')"
              />
            </div>

            <!-- Peso -->
            <div class="col-span-2">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('peso') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Peso
              </label>
              <input
                type="number"
                [value]="antes.peso || 0"
                name="antes_peso"
                disabled
                [ngClass]="getInputClass('peso', 'before')"
              />
            </div>

            <!-- Variedades -->
            <div class="col-span-2">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('variedades') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Variedades
              </label>
              <input
                type="text"
                [value]="getVariedadesText(antes.variedades)"
                name="antes_variedades"
                disabled
                [ngClass]="getInputClass('variedades', 'before')"
              />
            </div>

            <!-- Proceso -->
            <div class="col-span-2">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('proceso') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Proceso
              </label>
              <input
                type="text"
                [value]="antes.proceso || ''"
                name="antes_proceso"
                disabled
                [ngClass]="getInputClass('proceso', 'before')"
              />
            </div>

            <!-- Clasificación -->
            <div class="col-span-2">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('clasificacion') ? 'text-red-600 font-medium' : 'text-gray-700'"
              >
                Clasificación
              </label>
              <input
                type="text"
                [value]="antes.clasificacion || ''"
                name="antes_clasificacion"
                disabled
                [ngClass]="getInputClass('clasificacion', 'before')"
              />
            </div>
          </form>
        </div>

        <!-- DESPUÉS -->
        <div class="border border-[#E5E5E5] rounded-xl p-5 bg-[#FFF8F2]">
          <div class="mb-4">
            <h3 class="text-lg font-semibold text-[#B8672E]">Después</h3>
            <p class="text-sm text-gray-500">Valores actualizados del lote</p>
          </div>

          <form class="grid grid-cols-2 gap-x-6 gap-y-4">
            <!-- Productor -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('productor') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Productor
              </label>
              <input
                type="text"
                [value]="despues.productor || ''"
                name="despues_productor"
                disabled
                [ngClass]="getInputClass('productor', 'after')"
              />
            </div>

            <!-- Finca -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('finca') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Finca
              </label>
              <input
                type="text"
                [value]="despues.finca || ''"
                name="despues_finca"
                disabled
                [ngClass]="getInputClass('finca', 'after')"
              />
            </div>

            <!-- Departamento -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('departamento') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Departamento
              </label>
              <input
                type="text"
                [value]="despues.departamento || ''"
                name="despues_departamento"
                disabled
                [ngClass]="getInputClass('departamento', 'after')"
              />
            </div>

            <!-- Distrito -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('distrito') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Distrito
              </label>
              <input
                type="text"
                [value]="despues.distrito || ''"
                name="despues_distrito"
                disabled
                [ngClass]="getInputClass('distrito', 'after')"
              />
            </div>

            <!-- Cliente -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('id_user') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Cliente
              </label>
              <input
                type="text"
                [value]="(despues.id_user! | UserNamePipe | async) || ''"
                name="despues_cliente"
                disabled
                [ngClass]="getInputClass('id_user', 'after')"
              />
            </div>

            <!-- Costo -->
            <div class="col-span-1">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('costo') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Costo (PEN)
              </label>
              <input
                type="number"
                [value]="despues.costo || 0"
                name="despues_costo"
                disabled
                [ngClass]="getInputClass('costo', 'after')"
              />
            </div>

            <!-- Peso -->
            <div class="col-span-2">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('peso') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Peso
              </label>
              <input
                type="number"
                [value]="despues.peso || 0"
                name="despues_peso"
                disabled
                [ngClass]="getInputClass('peso', 'after')"
              />
            </div>

            <!-- Variedades -->
            <div class="col-span-2">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('variedades') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Variedades
              </label>
              <input
                type="text"
                [value]="getVariedadesText(despues.variedades)"
                name="despues_variedades"
                disabled
                [ngClass]="getInputClass('variedades', 'after')"
              />
            </div>

            <!-- Proceso -->
            <div class="col-span-2">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('proceso') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Proceso
              </label>
              <input
                type="text"
                [value]="despues.proceso || ''"
                name="despues_proceso"
                disabled
                [ngClass]="getInputClass('proceso', 'after')"
              />
            </div>

            <!-- Clasificación -->
            <div class="col-span-2">
              <label
                class="block text-sm mb-1"
                [ngClass]="hasChanged('clasificacion') ? 'text-[#B8672E] font-medium' : 'text-gray-700'"
              >
                Clasificación
              </label>
              <input
                type="text"
                [value]="despues.clasificacion || ''"
                name="despues_clasificacion"
                disabled
                [ngClass]="getInputClass('clasificacion', 'after')"
              />
            </div>
          </form>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end items-center px-6 py-4 border-t border-[#E5E5E5] space-x-2">
      <button
        (click)="onCancel()"
        class="px-4 py-2 rounded border border-[#A67C52] hover:bg-[#F3F2F1]"
      >
        Cerrar
      </button>
    </div>
  </div>
</div>
