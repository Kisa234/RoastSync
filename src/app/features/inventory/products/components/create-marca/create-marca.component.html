<div class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-sm overflow-hidden">

    <div class="flex justify-between items-center border-b border-[#E5E5E5] px-5 py-3">
      <h3 class="text-base font-semibold text-[#1F1F1F]">Agregar Marca</h3>
      <button (click)="closeModal()" class="text-gray-500 hover:text-gray-700 transition text-lg font-semibold">✕</button>
    </div>

    <div class="p-5 space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
        <input
          type="text"
          [(ngModel)]="marcaForm.nombre"
          name="marca_nombre"
          class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
          placeholder="EJ. TIMEMORE"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <textarea
          [(ngModel)]="marcaForm.descripcion"
          name="marca_descripcion"
          rows="2"
          class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
          placeholder="Opcional"
        ></textarea>
      </div>

      <div class="flex justify-end gap-3 pt-2 border-t border-[#E5E5E5]">
        <button
          type="button"
          (click)="closeModal()"
          class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition"
        >
          Cancelar
        </button>

        <button
          type="button"
          (click)="saveMarca()"
          class="bg-[#B8672E] text-white px-4 py-2 rounded-lg shadow hover:bg-[#A05622] transition disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ 'Guardar' }}
        </button>
      </div>
    </div>

  </div>
</div>
