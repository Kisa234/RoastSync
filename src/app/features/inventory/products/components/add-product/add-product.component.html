<div class="fixed inset-0 bg-opacity-50 backdrop-blur-md flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-2xl overflow-hidden">

    <!-- Header -->
    <div class="flex justify-between items-center border-b border-[#E5E5E5] px-6 py-4">
      <h2 class="text-lg font-semibold text-[#1F1F1F]">Agregar Producto</h2>
      <button (click)="close()" class="text-gray-500 hover:text-gray-700 transition text-lg font-semibold">✕</button>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="save()" class="p-6 space-y-5">

      <!-- ✅ FLEX 2 COLUMNAS -->
      <div class="flex flex-col md:flex-row gap-6">

        <!-- ✅ Columna 1 -->
        <div class="w-full md:w-1/2 space-y-4">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
            <input
              type="text"
              [(ngModel)]="form.nombre"
              name="nombre"
              class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
              placeholder="Ej. Café Premium..."
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
            <textarea
              [(ngModel)]="form.descripcion"
              name="descripcion"
              rows="3"
              class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
              placeholder="Opcional"
            ></textarea>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
            <select
              [(ngModel)]="form.id_categoria"
              name="id_categoria"
              class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
            >
              <option value="" disabled hidden>Seleccione una categoría</option>
              <option *ngFor="let categoria of categorias" [value]="categoria.id_categoria">
                {{ categoria.id_categoria }} - {{ categoria.nombre }}
              </option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Marca</label>

            <div class="flex gap-2">
              <select
                [(ngModel)]="form.id_marca"
                name="id_marca"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
              >
                <option [ngValue]="null">Sin marca</option>
                <option *ngFor="let m of marcas" [ngValue]="m.id_marca">
                  {{ m.nombre }}
                </option>
              </select>

              <button
                type="button"
                (click)="openAddMarca()"
                class="bg-[#B8672E] text-white px-4 rounded-lg hover:bg-[#A05622] transition whitespace-nowrap"
                title="Agregar marca"
              >
                + Agregar
              </button>
            </div>
          </div>

        </div>

        <!-- ✅ Columna 2 -->
        <div class="w-full md:w-1/2 space-y-4">

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Modelo</label>
              <input
                type="text"
                [(ngModel)]="form.modelo"
                name="modelo"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
                placeholder="Opcional"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
              <input
                type="text"
                [(ngModel)]="form.color"
                name="color"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
                placeholder="Opcional"
              />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Peso (kg)</label>
              <input
                type="number"
                [(ngModel)]="form.peso_kg"
                name="peso_kg"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
                placeholder="0.00"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Material</label>
              <input
                type="text"
                [(ngModel)]="form.material"
                name="material"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
                placeholder="Opcional"
              />
            </div>
          </div>

          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Largo (cm)</label>
              <input
                type="number"
                [(ngModel)]="form.largo_cm"
                name="largo_cm"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Ancho (cm)</label>
              <input
                type="number"
                [(ngModel)]="form.ancho_cm"
                name="ancho_cm"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Alto (cm)</label>
              <input
                type="number"
                [(ngModel)]="form.alto_cm"
                name="alto_cm"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Volumen (cm³)</label>
            <input
              type="number"
              [(ngModel)]="form.volumen_cm3"
              name="volumen_cm3"
              class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
            />
          </div>

        </div>
      </div>

      <!-- Footer -->
      <div class="flex justify-end space-x-3 pt-3 border-t border-[#E5E5E5]">
        <button
          type="button"
          (click)="close()"
          class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition"
        >
          Cancelar
        </button>

        <button
          type="submit"
          [disabled]="loading"
          class="bg-[#B8672E] text-white px-4 py-2 rounded-lg shadow hover:bg-[#A05622] transition"
        >
          {{ loading ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

<!--MODAL-->
<create-marca *ngIf="showAddMarca" (close)="closeModal()"></create-marca>
