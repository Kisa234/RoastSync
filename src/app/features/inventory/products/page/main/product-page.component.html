<div class="h-full p-6 bg-[#F9F9F9] overflow-auto">

  <!-- Header -->
  <div class="flex justify-between items-center mb-5">
    <div>
      <h1 class="text-2xl font-bold text-[#1F1F1F]">Inventario de Productos</h1>
      <p class="text-gray-600">Visualiza el stock total de productos y sus categorías</p>
    </div>

    <div class="flex space-x-3">
      <!-- Botón Productos -->
      <button class="flex items-center bg-[#B8672E] text-white px-4 py-2 rounded shadow hover:bg-[#A67C52] transition"
        (click)="openProductos()">
        <lucide-icon [img]="Eye" class="w-5 h-5 mr-2" />
        Ver Productos
      </button>

      <!-- Botón Categorías -->
      <button
        class="flex items-center bg-[#F4F4F4] text-[#1F1F1F] px-4 py-2 rounded shadow hover:bg-[#E5E5E5] transition"
        (click)="openCategorias()">
        <lucide-icon [img]="Eye" class="w-5 h-5 mr-2" />
        Ver Categorías
      </button>

      <!-- Botón Ingreso Productos -->
      <button class="flex items-center bg-[#4CAF50] text-white px-4 py-2 rounded shadow hover:bg-[#45A049] transition"
        (click)="openIngresoProducto()">
        <lucide-icon [img]="Plus" class="w-5 h-5 mr-2" />
        Ingreso de Productos
      </button>
    </div>
  </div>

  <!-- Contenedor principal -->
  <div class="bg-white rounded-lg border border-[#E5E5E5] shadow-sm p-6 space-y-6">

    <!-- Filtros -->
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-xl font-semibold text-[#1F1F1F]">Resumen de Inventario</h2>

      <select [(ngModel)]="selectedCategoria" (change)="onCategoriaChange()"
        class="border border-[#E5E5E5] rounded px-3 py-2 text-sm text-gray-700 focus:outline-none">
        <option value="">Todas las categorías</option>
        <option *ngFor="let c of categorias" [value]="c.id_categoria">
          {{ c.nombre }}
        </option>
      </select>
    </div>

    <!-- Tabla de Productos con Stock -->
    <div class="overflow-x-auto m-1 rounded-lg shadow-sm">
      <table class="min-w-full table-auto divide-y divide-[#E5E5E5]">
        <thead class="bg-[#F9F9F9]">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Producto</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Stock Total</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Acciones</th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-[#E5E5E5]">
          <tr *ngFor="let p of productosConStock" class="hover:bg-[#F9F9F9]">
            <td class="px-6 py-4 text-sm text-gray-700">
              {{ p.nombre }}
            </td>

            <td class="px-6 py-4 text-sm text-gray-700 font-semibold">
              {{ p.totalStock }}
            </td>


            <td class="px-6 py-4 text-sm text-gray-700">
              <button (click)="goToMovimientos(p.id_producto)" class="text-gray-500 hover:text-blue-600">
                <lucide-icon class="w-5 h-5" [img]="Eye"></lucide-icon>
              </button>
            </td>
          </tr>

          <tr *ngIf="productosConStock.length === 0">
            <td colspan="4" class="px-6 py-6 text-center text-gray-500">
              No hay productos con inventario.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- Modales -->
<productos *ngIf="showProductos" (closes)="closeModals()"></productos>

<categorias *ngIf="showCategorias" (closes)="closeModals()"></categorias>

<ingreso-product *ngIf="showIngresoProducto" (closes)="closeModals()"></ingreso-product>
