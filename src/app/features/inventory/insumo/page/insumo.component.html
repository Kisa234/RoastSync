<div class="h-screen p-6 bg-[#F9F9F9] overflow-auto">

  <!-- Header -->
  <div class="flex justify-between items-center mb-5">
    <div>
      <h1 class="text-2xl font-bold text-[#1F1F1F]">Insumos</h1>
      <p class="text-gray-600">Gestión de insumos y catálogo</p>
    </div>

    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2.5">
        <!-- Ver Insumos -->
        <button class="flex items-center bg-[#B8672E] text-white px-4 py-2 rounded shadow hover:bg-[#A67C52] transition"
          (click)="openListInsumos()">
          <lucide-icon [img]="Eye" class="w-5 h-5 mr-2"></lucide-icon>
          Ver Insumos
        </button>

        <!-- Ver Categorías -->
        <button
          class="flex items-center bg-white border border-[#E5E5E5] text-[#1F1F1F] px-4 py-2 rounded shadow hover:bg-[#F9F9F9] transition"
          (click)="openListCategorias()">
          <lucide-icon [img]="Eye" class="w-5 h-5 mr-2"></lucide-icon>
          Ver Categorías
        </button>
      </div>
    </div>
  </div>

  <!-- Contenedor -->
  <div class="border border-[#E5E5E5] rounded-lg bg-white p-6 shadow-sm">

    <!-- Loading -->
    <div *ngIf="loading" class="py-10 text-center text-gray-500">
      Cargando insumos...
    </div>

    <!-- Filtros -->
    <div class="flex gap-2.5 mb-4">

      <!-- Buscador -->
      <div class="relative w-full max-w-lg">
        <lucide-icon [img]="Search" class="absolute left-2 top-2 w-5 h-5 text-gray-400">
        </lucide-icon>

        <input type="text" [(ngModel)]="filterText" (ngModelChange)="onSearchChange()"
          placeholder="Buscar por nombre, categoría o unidad..." class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-2
             focus:ring-2 focus:ring-[#B8672E] focus:outline-none text-sm" />
      </div>

    </div>

    <!-- Tabla -->
    <div *ngIf="!loading" class="rounded-lg shadow-sm overflow-x-auto">
      <table class="min-w-full table-auto divide-y divide-[#E5E5E5]">

        <thead class="bg-[#F9F9F9]">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Nombre</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Categoría</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Unidad</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Estado</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-600 uppercase">Acciones</th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-[#E5E5E5]">
          <tr *ngFor="let i of insumos">

            <td class="px-6 py-4 text-sm text-gray-700">
              {{ i.nombre }}
            </td>

            <td class="px-6 py-4 text-sm text-gray-700">
              {{ i.id_categoria | categoriaInsumo: categorias }}
            </td>

            <td class="px-6 py-4 text-sm text-gray-700">
              {{ i.unidad_medida }}
            </td>

            <td class="px-6 py-4 text-sm">
              <span class="px-3 py-1 rounded-full text-xs font-medium" [ngClass]="{
                  'bg-green-100 text-green-700': i.activo,
                  'bg-red-100 text-red-700': !i.activo
                }">
                {{ i.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>

            <td class="px-6 py-4 text-right text-sm">
              <div class="flex justify-end space-x-2">

                <!-- Editar (placeholder) -->
                <button class="text-gray-500 hover:text-gray-700" title="Editar">
                  <lucide-icon [img]="Pencil" class="w-5 h-5"></lucide-icon>
                </button>

                <!-- Ver (placeholder) -->
                <button class="text-gray-500 hover:text-gray-700" title="Detalle">
                  <lucide-icon [img]="Eye" class="w-5 h-5"></lucide-icon>
                </button>

                <!-- Activar/Desactivar -->
                <button *ngIf="i.activo" (click)="setActivo(i, false)" class="text-gray-500 hover:text-red-600"
                  title="Inactivar">
                  <lucide-icon [img]="Ban" class="w-5 h-5"></lucide-icon>
                </button>

                <button *ngIf="!i.activo" (click)="setActivo(i, true)" class="text-gray-500 hover:text-green-600"
                  title="Activar">
                  <lucide-icon [img]="CheckCircle" class="w-5 h-5"></lucide-icon>
                </button>

              </div>
            </td>

          </tr>

          <tr *ngIf="insumos.length === 0">
            <td colspan="6" class="text-center py-8 text-gray-500">
              No hay insumos registrados.
            </td>
          </tr>

        </tbody>

      </table>
    </div>
  </div>
</div>

<app-insumos
  *ngIf="showListInsumos"
  (close)="closeModals()">
</app-insumos>

<app-categorias
  *ngIf="showListCategorias"
  (close)="closeModals()">
</app-categorias>
