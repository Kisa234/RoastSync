<div class="fixed inset-0 bg-black/30 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-lg overflow-hidden">

        <!-- Header -->
        <div class="flex justify-between items-start px-6 pt-5">
            <div>
                <h2 class="text-lg font-semibold text-zinc-900">Nuevo Insumo</h2>
                <p class="text-sm text-zinc-500">Registra un nuevo insumo en el sistema</p>
            </div>

            <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600">
                ✕
            </button>
        </div>

        <!-- Body -->
        <div class="px-6 py-5 space-y-4">

            <div *ngIf="errorMsg" class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
                {{ errorMsg }}
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <!-- Nombre -->
                <div>
                    <label class="text-sm font-medium text-zinc-700">Nombre</label>
                    <input [(ngModel)]="nombre" type="text" class="w-full mt-1 border border-zinc-200 rounded-lg px-3 py-2
                   focus:ring-2 focus:ring-[#B8672E]/30 outline-none" />
                </div>

                <!-- Unidad -->
                <div>
                    <label class="text-sm font-medium text-zinc-700">Unidad de medida</label>

                    <select [(ngModel)]="unidad_medida" class="w-full mt-1 border border-zinc-200 rounded-lg px-3 py-2 bg-white
           focus:ring-2 focus:ring-[#B8672E]/30 outline-none">

                        <option value="" disabled>Selecciona una unidad</option>

                        <option *ngFor="let u of unidadesMedida" [value]="u">
                            {{ u }}
                        </option>

                    </select>
                </div>

                <!-- Categoría -->
                <div class="md:col-span-2">
                    <label class="text-sm font-medium text-zinc-700">Categoría</label>
                    <select [(ngModel)]="id_categoria" class="w-full mt-1 border border-zinc-200 rounded-lg px-3 py-2 bg-white
                   focus:ring-2 focus:ring-[#B8672E]/30 outline-none">

                        <option value="" disabled>Selecciona una categoría</option>

                        <option *ngFor="let c of categorias" [value]="c.id_categoria">
                            {{ c.nombre }}
                        </option>

                    </select>
                </div>

                <!-- Descripción -->
                <div class="md:col-span-2">
                    <label class="text-sm font-medium text-zinc-700">Descripción (opcional)</label>
                    <textarea [(ngModel)]="descripcion" rows="3" class="w-full mt-1 border border-zinc-200 rounded-lg px-3 py-2
                   focus:ring-2 focus:ring-[#B8672E]/30 outline-none">
          </textarea>
                </div>

            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-3 pt-2">
                <button (click)="onCancel()" class="px-4 py-2 rounded-lg border border-zinc-200 text-zinc-700">
                    Cancelar
                </button>

                <button (click)="save()" [disabled]="saving"
                    class="px-4 py-2 rounded-lg bg-[#B8672E] text-white disabled:opacity-60">
                    {{ saving ? 'Guardando...' : 'Guardar' }}
                </button>
            </div>

        </div>
    </div>
</div>
