<div class="fixed inset-0 bg-opacity-50 backdrop-blur-md flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-xl overflow-hidden">

    <!-- Header -->
    <div class="flex justify-between items-center border-b border-[#E5E5E5] px-6 py-4">
      <div>
        <h2 class="text-lg font-semibold text-[#1F1F1F]">Registrar Ingreso</h2>
        <p class="text-sm text-gray-600">Ingresa stock manual para insumos</p>
      </div>

      <button
        type="button"
        (click)="close.emit()"
        class="text-gray-500 hover:text-gray-700 transition text-lg font-semibold">
        ✕
      </button>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="save()" class="p-6 space-y-5">

      <div class="flex gap-6">
        <div class="w-full space-y-4">

          <!-- Insumo -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Insumo *</label>
            <select
              [(ngModel)]="form.id_insumo"
              name="id_insumo"
              required
              class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]">
              <option value="" disabled hidden>Seleccione un insumo</option>
              <option *ngFor="let i of insumosActivos" [value]="i.id_insumo">
                {{ i.nombre }}
              </option>
            </select>
          </div>

          <!-- Almacén -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Almacén *</label>
            <select
              [(ngModel)]="form.id_almacen"
              name="id_almacen"
              required
              class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]">
              <option value="" disabled hidden>Seleccione un almacén</option>
              <option *ngFor="let a of almacenes" [value]="a.id_almacen">
                {{ a.nombre }}
              </option>
            </select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <!-- Cantidad -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Cantidad *</label>
              <input
                type="number"
                [(ngModel)]="form.cantidad"
                name="cantidad"
                required
                min="1"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
                placeholder="1" />
            </div>

            <!-- Precio compra -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Precio compra *</label>
              <input
                type="number"
                [(ngModel)]="form.precio_compra"
                name="precio_compra"
                required
                min="0"
                step="0.01"
                class="w-full border border-[#E5E5E5] rounded-lg p-2 focus:outline-none focus:ring-1 focus:ring-[#B8672E]"
                placeholder="0.00" />
            </div>
          </div>

        </div>
      </div>

      <!-- Footer -->
      <div class="flex justify-end space-x-3 pt-3 border-t border-[#E5E5E5]">
        <button
          type="button"
          (click)="close.emit()"
          class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition">
          Cancelar
        </button>

        <button
          type="submit"
          [disabled]="loading || !form.id_insumo || !form.id_almacen || form.cantidad <= 0"
          class="bg-[#B8672E] text-white px-4 py-2 rounded-lg shadow hover:bg-[#A05622] transition">
          {{ loading ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>
