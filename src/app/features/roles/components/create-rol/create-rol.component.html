<div class="fixed inset-0 bg-black/40 backdrop-blur-md flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-lg overflow-hidden">

    <!-- HEADER -->
    <div class="flex justify-between items-center px-6 pt-4">
      <div>
        <h2 class="text-xl font-semibold text-[#1F1F1F]">Crear rol</h2>
        <p class="text-gray-600 text-sm">Define un rol para asignar permisos</p>
      </div>

      <button type="button" (click)="cancel()" class="text-gray-400 hover:text-gray-600">
        <lucide-icon [img]="X" class="w-5 h-5"></lucide-icon>
      </button>
    </div>

    <!-- BODY -->
    <div class="px-6 py-5 space-y-4">
      <div>
        <label class="block text-gray-700 text-sm mb-1">Nombre</label>
        <input
          class="w-full border border-[#E5E5E5] rounded px-3 py-2"
          [(ngModel)]="nombre"
          placeholder="Ej: Administrador"
        />
      </div>

      <div>
        <label class="block text-gray-700 text-sm mb-1">Descripción (opcional)</label>
        <textarea
          class="w-full border border-[#E5E5E5] rounded px-3 py-2 min-h-[90px]"
          [(ngModel)]="descripcion"
          placeholder="Breve descripción del rol"
        ></textarea>
      </div>

      <div *ngIf="errorMsg" class="text-sm text-red-600">
        {{ errorMsg }}
      </div>
    </div>

    <!-- FOOTER -->
    <div class="flex justify-end items-center px-6 py-4 border-t border-[#E5E5E5] space-x-2">
      <button
        type="button"
        (click)="cancel()"
        class="px-4 py-2 rounded border border-[#A67C52] hover:bg-[#F3F2F1]"
      >
        Cancelar
      </button>

      <button
        type="button"
        (click)="save()"
        [disabled]="!nombre.trim() || loading"
        class="px-4 py-2 rounded bg-[#B8672E] text-white hover:bg-[#A67C52] flex items-center disabled:opacity-50"
      >
        <span *ngIf="!loading">Crear</span>
        <span *ngIf="loading">Creando...</span>
      </button>
    </div>

  </div>
</div>
