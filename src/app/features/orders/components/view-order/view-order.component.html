<div class="fixed inset-0 bg-black/30 flex items-center justify-center z-10 p-4" (click)="onCancel()">
  <div
    class="bg-white rounded-lg shadow-lg w-full max-w-xl overflow-auto"
    (click)="$event.stopPropagation()"
  >

    <!-- Header -->
    <div class="flex justify-between items-center px-6 py-4 border-b border-[#E5E5E5]">
      <div>
        <h2 class="text-xl font-semibold text-[#1F1F1F]">Revisar Pedido</h2>
        <p class="text-gray-600 text-sm">Revisa la orden de Venta Verde o Tostado Verde</p>
      </div>
      <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600">
        <lucide-icon [img]="X" class="w-5 h-5" />
      </button>
    </div>

    <!-- Form -->
    <form class="grid grid-cols-2 gap-x-6 gap-y-4 px-6 py-5">
      <!-- Tipo Pedido -->
      <div>
        <label for="tipo" class="block text-gray-700 text-sm mb-1">Tipo Pedido *</label>
        <select
          id="tipo"
          name="tipo_pedido"
          [(ngModel)]="model.tipo_pedido"
          disabled
          class="w-full border border-[#E5E5E5] rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#B8672E]"
        >
          <option value="" disabled>Selecciona tipo</option>
          <option *ngFor="let t of tipos" [value]="t">{{ t }}</option>
        </select>
      </div>

      <!-- Cliente -->
      <div>
        <label for="cliente" class="block text-gray-700 text-sm mb-1">Cliente *</label>
        <select
          id="cliente"
          name="id_user"
          [(ngModel)]="model.id_user"
          disabled
          class="w-full border border-[#E5E5E5] rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#B8672E]"
        >
          <option value="" disabled>Selecciona cliente</option>
          <option *ngFor="let u of clientes" [value]="u.id_user">{{ u.nombre }}</option>
        </select>
      </div>

      <!-- Lote -->
      <div>
        <label for="lote" class="block text-gray-700 text-sm mb-1">Lote *</label>
        <select
          id="lote"
          name="id_lote"
          [(ngModel)]="model.id_lote"
          disabled
          class="w-full border border-[#E5E5E5] rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#B8672E]"
        >
          <option value="" disabled>Selecciona lote</option>
          <option *ngFor="let l of lotes" [value]="l.id_lote">{{ l.id_lote }}</option>
        </select>
      </div>

      <!-- Almacen -->
      <div>
        <label class="block text-gray-700 text-sm mb-1">Almacén *</label>
        <select
          name="id_almacen"
          [(ngModel)]="model.id_almacen"
          disabled
          class="w-full border border-[#E5E5E5] rounded-lg px-3 py-2 bg-[#F9F9F9] text-gray-700"
        >
          <option value="" disabled>Selecciona Almacén</option>
          <option *ngFor="let a of almacenesFiltrados" [value]="a.id_almacen">
            {{ a.nombre }}
          </option>
        </select>
      </div>

      <!-- Cantidad Pedido -->
      <div>
        <label for="cantidad" class="block text-gray-700 text-sm mb-1">Cantidad (Gr) *</label>
        <input
          id="cantidad"
          name="cantidad"
          type="number"
          min="1"
          [(ngModel)]="model.cantidad"
          disabled
          class="w-full border border-[#E5E5E5] rounded-lg px-3 py-2 bg-[#F9F9F9] text-gray-700"
        />
      </div>

      <!-- Disponible -->
      <div>
        <label class="block text-gray-700 text-sm mb-1">Disponible (Gr)</label>
        <input
          type="text"
          [value]="availableQty | number:'1.0-0'"
          disabled
          class="w-full bg-[#F9F9F9] border border-[#E5E5E5] rounded-lg px-3 py-2 text-gray-700"
        />
      </div>

      <!-- Comentario -->
      <div class="col-span-2">
        <label for="comentario" class="block text-gray-700 text-sm mb-1">Comentario</label>
        <textarea
          id="comentario"
          name="comentario"
          [(ngModel)]="model.comentario"
          rows="4"
          disabled
          class="w-full border border-[#E5E5E5] rounded-lg px-3 py-2 bg-[#F9F9F9] text-gray-700"
        ></textarea>
      </div>
    </form>
  </div>
</div>
